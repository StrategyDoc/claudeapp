<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Claude Web Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 0.75rem 1rem;
      background: #111827;
      color: #f9fafb;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between; /* changed */
      gap: 0.5rem;
    }
    #reset-button {
      border: 1px solid #6b7280;
      background: transparent;
      color: #e5e7eb;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #reset-button:hover {
      background: #374151;
    }
    #chat-container {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .message {
      max-width: 80%;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .user {
      background: #2563eb;
      color: #f9fafb;
      margin-left: auto;
      border-bottom-right-radius: 0.25rem;
    }
    .assistant {
      background: #e5e7eb;
      color: #111827;
      margin-right: auto;
      border-bottom-left-radius: 0.25rem;
    }
    #input-form {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      border-top: 1px solid #d1d5db;
      background: #ffffff;
    }
    #message-input {
      flex: 1;
      resize: none;
      padding: 0.5rem;
      border-radius: 0.375rem;
      border: 1px solid #d1d5db;
      font-family: inherit;
      font-size: 0.95rem;
      min-height: 2.25rem;
      max-height: 7rem;
    }
    #send-button {
      padding: 0 1rem;
      border-radius: 0.375rem;
      border: none;
      background: #2563eb;
      color: #f9fafb;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    #status {
      font-size: 0.8rem;
      color: #6b7280;
      padding: 0 0.75rem 0.5rem;
      min-height: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <span>Claude Web Chat</span>
    <button id="reset-button" type="button">Reset</button>
  </header>

  <div id="chat-container"></div>

  <div id="status"></div>

  <form id="input-form">
    <textarea
      id="message-input"
      placeholder="Type your message and press Enter (Shift+Enter for a new line)…"
    ></textarea>
    <button id="send-button" type="submit">Send</button>
  </form>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const inputForm = document.getElementById("input-form");
    const messageInput = document.getElementById("message-input");
    const sendButton = document.getElementById("send-button");
    const statusEl = document.getElementById("status");
    const resetButton = document.getElementById("reset-button");

    function appendMessage(role, text) {
      const div = document.createElement("div");
      div.classList.add("message");
      div.classList.add(role === "user" ? "user" : "assistant");
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage(message) {
      appendMessage("user", message);
      statusEl.textContent = "Thinking…";
      sendButton.disabled = true;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();

        if (!res.ok) {
          appendMessage("assistant", data.error || "Error from server.");
        } else {
          appendMessage("assistant", data.reply);
        }
      } catch (err) {
        appendMessage("assistant", "Network error: " + err.message);
      } finally {
        statusEl.textContent = "";
        sendButton.disabled = false;
      }
    }

    inputForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;
      messageInput.value = "";
      sendMessage(text);
    });

    // Enter to send, Shift+Enter for newline
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        inputForm.dispatchEvent(new Event("submit"));
      }
    });

    // Reset conversation: clear UI + tell server
    resetButton.addEventListener("click", async () => {
      chatContainer.innerHTML = "";
      statusEl.textContent = "";
      try {
        await fetch("/api/reset", { method: "POST" });
      } catch (e) {
        // No-op if it fails; it's only a convenience
      }
    });
  </script>
</body>
</html>
